<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Details — DriveEasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body data-page="vehicle-detail">

  <!-- ── NAVIGATION ──────────────────────────────────────── -->
  <header>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="container">
        <a href="/index.html" class="navbar-brand" aria-label="DriveEasy home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
          </svg>
          DriveEasy
        </a>
        <div class="nav-links">
          <a href="/pages/search.html">Browse Vehicles</a>
          <a href="/pages/my-bookings.html" data-auth="loggedIn" style="display:none">My Bookings</a>
          <a href="/pages/admin/dashboard.html" data-auth-role="staff,manager" style="display:none">Admin</a>
          <div data-auth="loggedOut" style="display:flex;gap:8px;">
            <a href="/pages/login.html"    class="btn btn-secondary btn-sm">Log In</a>
            <a href="/pages/register.html" class="btn btn-primary   btn-sm">Sign Up</a>
          </div>
          <!-- Avatar + dropdown (populated by auth.js) -->
          <div class="nav-user" data-auth="loggedIn" style="display:none"></div>
        </div>
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="mobile-menu" id="mobile-menu">
        <a href="/pages/search.html">Browse Vehicles</a>
        <a href="/pages/my-bookings.html" data-mobile-auth="loggedIn" style="display:none">My Bookings</a>
        <a href="/pages/profile.html" data-mobile-auth="loggedIn" style="display:none">Profile</a>
        <div data-mobile-auth="loggedOut" style="display:flex;flex-direction:column;gap:8px;">
          <a href="/pages/login.html" class="btn btn-secondary">Log In</a>
          <a href="/pages/register.html" class="btn btn-primary">Sign Up</a>
        </div>
        <button class="btn btn-secondary" data-action="logout" data-mobile-auth="loggedIn" style="display:none">Log Out</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <!--
        vehicle-detail-content is populated entirely by app.js: initVehicleDetail()
        It renders: gallery, info, booking CTA, reviews section, and optional review form.
      -->
      <div id="vehicle-detail-content" style="min-height:400px;">
        <div class="spinner-overlay" role="status" aria-label="Loading vehicle details">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <div class="footer-brand">DriveEasy</div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/index.html">Home</a>
        <a href="/pages/search.html">Browse</a>
      </nav>
      <p class="footer-copy">&copy; 2026 DriveEasy. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/utils.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
